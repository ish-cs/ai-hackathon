<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo · Source CRM → Target System</title>
    <style>
      body { margin:0; font:15px/1.5 ui-sans-serif,system-ui,sans-serif; background:#f4f1ea; color:#1c1c1c;
             display:grid; grid-template-columns:1fr 1fr; gap:24px; padding:32px; }
      .card { background:#fff; border:1px solid #e3ddd0; border-radius:14px; padding:24px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
      h2 { margin:0 0 16px; font-size:16px; }
      table { width:100%; border-collapse:collapse; font-size:14px; }
      th,td { text-align:left; padding:8px 6px; border-bottom:1px solid #efe9dd; }
      th { color:#9b9384; font-weight:600; }
      label { display:block; font-size:13px; color:#6b6357; margin:14px 0 4px; }
      input { width:100%; padding:10px 12px; border:1px solid #d9d2c4; border-radius:9px; font-size:14px; }
      button { margin-top:18px; padding:11px 18px; border:none; border-radius:9px; background:#c2552f; color:#fff;
               font-size:14px; font-weight:600; cursor:pointer; }
      .saved { margin-top:14px; color:#2e7d4f; font-weight:600; min-height:20px; }
      .flag { position:fixed; bottom:12px; right:16px; font-size:12px; color:#b0a896; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Source CRM</h2>
      <table>
        <thead><tr><th>Customer</th><th>Email</th></tr></thead>
        <tbody>
          <tr><td>Acme Corp</td><td>hello@acme.com</td></tr>
          <tr><td>Beta LLC</td><td>hi@beta.com</td></tr>
          <tr><td>Cobalt Inc</td><td>team@cobalt.io</td></tr>
          <tr><td>Delta Co</td><td>ops@delta.co</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2>Target System — New Customer</h2>
      <form id="target">
        <label for="name">Customer Name</label>
        <input id="name" name="name" type="text" />
        <label for="email">Email</label>
        <input id="email" name="email" type="email" />
        <!-- The kill shot: ?break=1 renames the submit button (id + text), so #submit-btn no longer matches. -->
        <button id="submit-btn" type="submit">Submit</button>
        <div class="saved" id="saved"></div>
      </form>
    </div>

    <div class="flag" id="flag"></div>
    <script>
      const broken = new URLSearchParams(location.search).get("break") === "1";
      if (broken) {
        const btn = document.getElementById("submit-btn");
        btn.id = "send-btn";        // selector #submit-btn now misses
        btn.textContent = "Send";   // only intent ("submit the form") survives
        document.getElementById("flag").textContent = "site changed: Submit → Send";
      }
      document.getElementById("target").addEventListener("submit", (e) => {
        e.preventDefault();
        const n = document.getElementById("name").value || "(empty)";
        document.getElementById("saved").textContent = `✓ saved ${n}`;
      });
    </script>
  </body>
</html>
