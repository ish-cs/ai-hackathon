<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LeadSheet — Q3 Outreach</title>
    <style>
      :root { --green:#0f9d58; --line:#e0e0e0; --head:#f8f9fa; --ink:#202124; --dim:#5f6368; --sel:#e6f4ea; }
      * { box-sizing:border-box; }
      body { margin:0; font:13px/1.5 "Google Sans",Roboto,Arial,system-ui,sans-serif; color:var(--ink); background:#fff; }
      .bar { display:flex; align-items:center; gap:12px; padding:8px 16px; border-bottom:1px solid var(--line); }
      .logo { width:28px; height:28px; border-radius:6px; background:var(--green); color:#fff; display:grid; place-items:center; font-weight:700; }
      .title { font-size:18px; font-weight:500; }
      .title small { display:block; font-size:12px; color:var(--dim); font-weight:400; }
      .toolbar { display:flex; gap:6px; padding:6px 16px; border-bottom:1px solid var(--line); color:var(--dim); font-size:13px; }
      .toolbar span { padding:4px 8px; border-radius:4px; }
      .toolbar span:hover { background:var(--head); }
      table { border-collapse:collapse; width:100%; }
      th, td { border:1px solid var(--line); padding:9px 12px; text-align:left; }
      thead th { background:var(--head); color:var(--dim); font-weight:500; position:sticky; top:0; z-index:1; }
      .rownum { background:var(--head); color:var(--dim); text-align:center; width:36px; user-select:none; }
      tbody tr:hover td { background:#fafafa; }
      tbody tr.sel td { background:var(--sel); }
      .name { font-weight:600; }
      .li-open { color:#0a66c2; text-decoration:none; font-weight:600; white-space:nowrap; }
      .li-open:hover { text-decoration:underline; }
      .hint { padding:10px 16px; color:var(--dim); font-size:12px; border-top:1px solid var(--line); }

      /* ---- status pill ---- */
      .st { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:2px 9px;
            border-radius:12px; font-weight:500; white-space:nowrap; }
      .st::before { content:""; width:8px; height:8px; border-radius:50%; background:currentColor; }
      .st-none  { color:#80868b; background:#f1f3f4; }
      .st-msg   { color:#1a73e8; background:#e8f0fe; }
      .st-reply { color:#188038; background:#e6f4ea; }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="logo">▦</div>
      <div class="title">LeadSheet <small id="lead-count">Q3 Outreach</small></div>
    </div>
    <div class="toolbar"><span>File</span><span>Edit</span><span>View</span><span>Insert</span><span>Data</span><span>Tools</span></div>

    <table>
      <thead>
        <tr><th class="rownum"></th><th>A — Name</th><th>B — Role</th><th>C — Company</th><th>D — Status</th><th>E — Action</th></tr>
      </thead>
      <tbody id="leads"></tbody>
    </table>
    <div class="hint">Click a lead's “Message on LinkedIn ↗” to open their profile in a new tab — the row flips to “Messaged”.</div>

    <script src="./leads.js"></script>
    <script>
      const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
      const tbody = document.getElementById("leads");
      const ST_CLASS = { none:"st-none", msg:"st-msg", reply:"st-reply" };
      const ST_LABEL = { none:"Not contacted", msg:"Messaged", reply:"Replied" };

      // Render the lead rows from the shared dataset (same people as linkedin.html).
      tbody.innerHTML = window.LEADS.map((p, idx) => `
        <tr data-row="${idx}">
          <td class="rownum">${idx + 1}</td>
          <td class="name" data-cell="name">${esc(p.name)}</td>
          <td data-cell="role">${esc(p.role)}</td>
          <td data-cell="company">${esc(p.company)}</td>
          <td data-cell="status"><span class="st ${ST_CLASS[p.status] || "st-none"}">${ST_LABEL[p.status] || "Not contacted"}</span></td>
          <td><a class="li-open" data-action="message" href="./linkedin.html" target="_blank">Message on LinkedIn ↗</a></td>
        </tr>`).join("");
      document.getElementById("lead-count").textContent = `Q3 Outreach · ${window.LEADS.length} leads`;

      // Row select (highlight) + Message flip — one delegated handler.
      tbody.addEventListener("click", (e) => {
        const a = e.target.closest(".li-open");
        if (a) {
          // Messaging a lead flips its Status to "Messaged" (unless already Replied), then the link opens.
          const cell = a.closest("tr").querySelector('[data-cell="status"] .st');
          if (cell && !cell.classList.contains("st-reply")) {
            cell.className = "st st-msg";
            cell.textContent = "Messaged";
          }
          return;
        }
        const tr = e.target.closest("tr[data-row]");
        if (!tr) return;
        for (const r of tbody.querySelectorAll("tr.sel")) r.classList.remove("sel");
        tr.classList.add("sel");
      });
    </script>
  </body>
</html>
