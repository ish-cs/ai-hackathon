<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkedUp — Search</title>
    <style>
      :root { --blue:#0a66c2; --blue2:#378fe9; --bg:#f4f2ee; --card:#fff; --line:#e0dfdc;
              --ink:#1d1d1f; --dim:#5e5e5e; --green:#057642; }
      * { box-sizing:border-box; }
      body { margin:0; font:15px/1.5 -apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
             background:var(--bg); color:var(--ink); }

      /* ---- top nav ---- */
      .nav { background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; }
      .nav-in { max-width:1128px; margin:0 auto; display:flex; align-items:center; gap:10px; padding:6px 18px; }
      .brand { display:flex; align-items:center; font-weight:800; font-size:20px; letter-spacing:-.5px; }
      .brand .word { color:var(--ink); }
      .brand .badge { background:var(--blue); color:#fff; border-radius:6px; padding:0 6px; margin-left:1px;
                      font-family:Georgia,serif; }
      .search-wrap { position:relative; }
      .search-wrap svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); opacity:.55; }
      #li-search { width:280px; padding:8px 12px 8px 32px; border:1px solid transparent; border-radius:6px;
                   background:#edf3f8; font-size:14px; }
      #li-search:focus { outline:none; border-color:var(--blue); background:#fff; }
      .nav .spacer { flex:1; }
      .navlinks { display:flex; align-items:center; gap:4px; }
      .navlink { display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 12px;
                 color:var(--dim); font-size:11px; cursor:pointer; border-bottom:2px solid transparent; }
      .navlink:hover, .navlink.active { color:var(--ink); }
      .navlink.active { border-bottom-color:var(--ink); }
      .navlink svg { width:22px; height:22px; }
      .me { width:24px; height:24px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--blue2)); }

      /* ---- layout ---- */
      .wrap { max-width:1128px; margin:24px auto; padding:0 16px; display:grid;
              grid-template-columns:1fr 300px; gap:24px; align-items:start; }
      @media (max-width:860px){ .wrap{ grid-template-columns:1fr; } .rail{ display:none; } }
      .col { display:grid; gap:12px; }
      .card { background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
      .pad { padding:18px; }

      /* ---- search results list ---- */
      .result-hd { font-size:13px; color:var(--dim); padding:12px 18px; border-bottom:1px solid var(--line); }
      .result { display:flex; align-items:flex-start; gap:14px; padding:16px 18px; }
      .result + .result { border-top:1px solid var(--line); }
      .result:hover { background:#f8fbff; }
      .avatar { border-radius:50%; background:linear-gradient(135deg,var(--blue),#70b5f9); flex:none;
                position:relative; }
      .av-sm { width:56px; height:56px; }
      .result .body { flex:1; min-width:0; }
      .result .who { font-weight:600; color:var(--blue); font-size:16px; }
      .result .who:hover { text-decoration:underline; cursor:pointer; }
      .result .sub { color:var(--ink); font-size:14px; margin-top:1px; }
      .result .meta { color:var(--dim); font-size:13px; margin-top:2px; }
      .badge-pill { display:inline-block; font-size:11px; color:var(--dim); border:1px solid var(--line);
                    border-radius:20px; padding:1px 8px; margin-left:6px; vertical-align:middle; }
      .row-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }

      .btn { border:none; border-radius:20px; padding:6px 16px; font-size:14px; font-weight:600; cursor:pointer;
             display:inline-flex; align-items:center; gap:6px; }
      .btn-primary { background:var(--blue); color:#fff; }
      .btn-primary:hover { background:#004182; }
      .btn-ghost { background:#fff; color:var(--blue); border:1.5px solid var(--blue); }
      .btn-ghost:hover { background:#eaf3fb; }
      .btn-quiet { background:#fff; color:var(--dim); border:1.5px solid #b0b0b0; }
      .btn-quiet:hover { background:#f3f3f3; }

      /* ---- right rail ---- */
      .rail .card .pad { font-size:13px; color:var(--dim); }
      .rail .ad { font-size:11px; color:#8a8a8a; margin-bottom:8px; }
      .rail .pv + .pv { margin-top:8px; }

      /* ---- messaging dock (bottom-right, like LinkedIn) ---- */
      #li-compose-box { position:fixed; right:20px; bottom:0; width:340px; z-index:30;
                        border-radius:10px 10px 0 0; box-shadow:0 0 0 1px var(--line),0 12px 28px rgba(0,0,0,.22); }
      .msg-hd { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line); }
      .msg-hd .who { font-weight:600; font-size:14px; }
      .msg-hd .pres { font-size:11px; color:var(--green); }
      .msg-body { padding:12px 14px; }
      textarea { width:100%; min-height:84px; border:1px solid var(--line); border-radius:8px; padding:10px;
                 font:inherit; resize:vertical; }
      textarea:focus { outline:none; border-color:var(--blue); }
      .msg-foot { display:flex; justify-content:flex-end; padding:0 14px 14px; }
      .sent { color:var(--green); font-weight:700; padding:0 14px 14px; }
      .flag { position:fixed; bottom:8px; left:16px; font-size:12px; color:#b7b3aa; z-index:40; }
      .dot { width:9px; height:9px; border-radius:50%; background:var(--green); position:absolute; right:1px; bottom:3px;
             border:2px solid #fff; }
      .hidden { display:none; }
    </style>
  </head>
  <body>
    <!-- ───────── top navigation ───────── -->
    <div class="nav">
      <div class="nav-in">
        <div class="brand"><span class="word">Linked</span><span class="badge">up</span></div>
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="li-search" type="text" placeholder="Search by name, role, company" value="engineering leaders" />
        </div>
        <div class="spacer"></div>
        <div class="navlinks">
          <div class="navlink"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3z"/></svg>Home</div>
          <div class="navlink"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 11a3 3 0 100-6 3 3 0 000 6zm7 0a3 3 0 100-6 3 3 0 000 6zM3 20v-2a4 4 0 014-4h4a4 4 0 014 4v2zm12-6h2a4 4 0 014 4v2h-4v-2a6 6 0 00-2-4z"/></svg>Network</div>
          <div class="navlink"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 5V3h6v2h5v14H4V5zm2 0h2V4h-2zm-5 2v10h12V7z"/></svg>Jobs</div>
          <div class="navlink active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v12H7l-3 3z"/></svg>Messaging</div>
          <div class="navlink"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22a2 2 0 002-2h-4a2 2 0 002 2zm7-6V11a7 7 0 10-14 0v5l-2 2v1h18v-1z"/></svg>Notifications</div>
          <div class="navlink"><span class="avatar me" style="width:24px;height:24px"></span>Me</div>
        </div>
      </div>
    </div>

    <div class="wrap">
      <!-- ───────── outreach targets: People search results (rendered from leads.js) ───────── -->
      <div class="col">
        <div class="card">
          <div class="result-hd">People · <span id="li-count">0</span> results</div>
          <div id="li-results"></div>
        </div>
      </div>

      <!-- right rail -->
      <div class="rail col">
        <div class="card"><div class="pad">
          <div class="ad">Promoted</div>
          <strong style="color:var(--ink)">Grow your network</strong>
          <div style="margin-top:6px">People in your industry are connecting this week.</div>
        </div></div>
        <div class="card"><div class="pad">
          <strong style="color:var(--ink)">People also viewed</strong>
          <div class="pv" style="margin-top:8px">· Tom Reyes — Recruiter</div>
          <div class="pv">· Dana Wu — Product Manager</div>
          <div class="pv">· Owen Park — Eng Manager</div>
        </div></div>
      </div>
    </div>

    <!-- Messaging dock (revealed after clicking a target's Message) — LinkedIn's bottom-right dock -->
    <div class="card hidden" id="li-compose-box">
      <div class="msg-hd">
        <div class="avatar av-sm" style="width:36px;height:36px"></div>
        <div><div class="who" id="li-compose-who">New message</div><div class="pres">● Active now</div></div>
      </div>
      <div class="msg-body">
        <textarea id="li-compose" placeholder="Write a message…"></textarea>
      </div>
      <div class="msg-foot"><button class="btn btn-primary" id="li-send">Send</button></div>
      <div class="sent hidden" id="li-sent">✓ Message sent</div>
    </div>

    <div class="flag" id="flag"></div>

    <script src="./leads.js"></script>
    <script>
      const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
      const results = document.getElementById("li-results");

      // Render the People list from the shared dataset. data-name personalizes the message dock.
      function render(list) {
        results.innerHTML = list.map((p) => `
          <div class="result" data-target data-name="${esc(p.name)}">
            <div class="avatar av-sm"><span class="dot"${p.online ? "" : ' style="background:#b0b0b0"'}></span></div>
            <div class="body">
              <div class="who">${esc(p.name)}<span class="badge-pill">${esc(p.conn)}</span><span class="badge-pill">${p.mutual} mutual</span></div>
              <div class="sub">${esc(p.role)} at ${esc(p.company)}</div>
              <div class="meta">${esc(p.loc)}</div>
              <div class="row-actions">
                <button class="btn btn-ghost li-message" type="button">✉ Message</button>
                <button class="btn btn-quiet li-connect" type="button">+ Connect</button>
              </div>
            </div>
          </div>`).join("");
        document.getElementById("li-count").textContent = list.length;
      }
      render(window.LEADS);

      // ── Open the messaging dock for whichever target's Message is clicked (event delegation) ──
      let activeName = "";
      results.addEventListener("click", (e) => {
        const msg = e.target.closest(".li-message");
        const con = e.target.closest(".li-connect");
        if (msg) {
          const target = msg.closest("[data-target]");
          activeName = (target && target.dataset.name) || "this person";
          document.getElementById("li-compose-who").textContent = activeName;
          document.getElementById("li-sent").classList.add("hidden");
          document.getElementById("li-compose").value = "";
          document.getElementById("li-compose-box").classList.remove("hidden");
          document.getElementById("li-compose").focus();
        } else if (con) {
          con.textContent = "✓ Pending"; con.disabled = true;
        }
      });

      // Live search over the target list (name / role / company). Default value shows everyone.
      const search = document.getElementById("li-search");
      search.addEventListener("input", () => {
        const term = search.value.trim().toLowerCase();
        if (term === "" || term === "engineering leaders") return render(window.LEADS);
        render(window.LEADS.filter((p) =>
          p.name.toLowerCase().includes(term) ||
          p.role.toLowerCase().includes(term) ||
          p.company.toLowerCase().includes(term)));
      });

      // ── Kill shot: ?break=1 renames the Send button (id + text) so #li-send no longer matches.
      // Captured by element reference, so this handler survives; only the recorded selector breaks.
      const sendBtn = document.getElementById("li-send");
      const broken = new URLSearchParams(location.search).get("break") === "1";
      if (broken) {
        sendBtn.id = "li-submit";          // recorded selector #li-send now misses
        sendBtn.textContent = "Send now";  // only intent ("the button that sends the message") survives
        document.getElementById("flag").textContent = "site changed: Send → Send now";
      }
      sendBtn.addEventListener("click", () => {
        const sent = document.getElementById("li-sent");
        sent.textContent = "✓ Message sent to " + (activeName || "this person");
        sent.classList.remove("hidden");
      });
    </script>
  </body>
</html>
