<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkedIn — Messaging</title>
    <style>
      :root { --blue:#0a66c2; --bg:#f4f2ee; --card:#fff; --line:#e0dfdc; --ink:#1d1d1f; --dim:#666; }
      * { box-sizing:border-box; }
      body { margin:0; font:15px/1.5 -apple-system,"Segoe UI",Roboto,system-ui,sans-serif; background:var(--bg); color:var(--ink); }
      .nav { background:var(--card); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px; padding:8px 18px; position:sticky; top:0; }
      .in { width:30px; height:30px; border-radius:6px; background:var(--blue); color:#fff; display:grid; place-items:center; font-weight:800; font-family:Georgia,serif; }
      #li-search { flex:0 1 320px; padding:8px 12px; border:1px solid var(--line); border-radius:6px; background:#eef3f8; font-size:14px; }
      .nav .spacer { flex:1; }
      .nav .me { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#0a66c2,#378fe9); }
      .wrap { max-width:680px; margin:20px auto; padding:0 16px; display:grid; gap:14px; }
      .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:18px; }
      .result { display:flex; align-items:center; gap:14px; cursor:pointer; }
      .result:hover { background:#fafafa; }
      .avatar { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#0a66c2,#70b5f9); flex:none; }
      .result .who { font-weight:600; } .result .sub { color:var(--dim); font-size:13px; }
      .hidden { display:none; }
      .profile-head { display:flex; align-items:center; gap:16px; }
      .profile-head .avatar { width:80px; height:80px; }
      .pname { font-size:22px; font-weight:700; }
      .phead { color:var(--dim); }
      .btn { border:none; border-radius:20px; padding:9px 20px; font-size:15px; font-weight:600; cursor:pointer; }
      .btn-primary { background:var(--blue); color:#fff; }
      .btn-ghost { background:#fff; color:var(--blue); border:1.5px solid var(--blue); }
      .mt { margin-top:14px; }
      textarea { width:100%; min-height:96px; border:1px solid var(--line); border-radius:8px; padding:12px; font:inherit; resize:vertical; }
      .compose-head { font-weight:600; margin-bottom:8px; }
      .sent { color:#057642; font-weight:700; margin-top:12px; }
      .flag { position:fixed; bottom:12px; right:16px; font-size:12px; color:#b7b3aa; }
    </style>
  </head>
  <body>
    <div class="nav">
      <div class="in">in</div>
      <input id="li-search" type="text" placeholder="Search by name" />
      <div class="spacer"></div>
      <div class="me"></div>
    </div>

    <div class="wrap">
      <!-- Search result (click to open the profile) -->
      <div class="card result" id="li-result" role="button" tabindex="0">
        <div class="avatar"></div>
        <div>
          <div class="who" id="li-result-name">Search result</div>
          <div class="sub">Open profile to message</div>
        </div>
      </div>

      <!-- Profile (revealed after clicking the result) -->
      <div class="card hidden" id="li-profile">
        <div class="profile-head">
          <div class="avatar"></div>
          <div>
            <div class="pname" id="li-pname">—</div>
            <div class="phead" id="li-phead">—</div>
          </div>
        </div>
        <button class="btn btn-ghost mt" id="li-message-btn">Message</button>
      </div>

      <!-- Compose (revealed after clicking Message) -->
      <div class="card hidden" id="li-compose-box">
        <div class="compose-head">New message</div>
        <textarea id="li-compose" placeholder="Write a message…"></textarea>
        <div class="mt"><button class="btn btn-primary" id="li-send">Send</button></div>
        <div class="sent hidden" id="li-sent">✓ Message sent</div>
      </div>
    </div>

    <div class="flag" id="flag"></div>
    <script>
      const q = () => document.getElementById("li-search").value.trim() || "this person";
      const show = (id) => document.getElementById(id).classList.remove("hidden");

      // Open profile from the search result; personalize the name from the search box.
      document.getElementById("li-result").addEventListener("click", () => {
        const name = q();
        document.getElementById("li-result-name").textContent = name;
        document.getElementById("li-pname").textContent = name;
        document.getElementById("li-phead").textContent = "Open to connect";
        show("li-profile");
      });

      document.getElementById("li-message-btn").addEventListener("click", () => show("li-compose-box"));

      // Capture the Send button by ELEMENT REFERENCE so the handler survives the ?break=1 rename.
      const sendBtn = document.getElementById("li-send");
      const broken = new URLSearchParams(location.search).get("break") === "1";
      if (broken) {
        sendBtn.id = "li-submit";          // recorded selector #li-send now misses
        sendBtn.textContent = "Send now";  // only intent ("the button that sends the message") survives
        document.getElementById("flag").textContent = "site changed: Send → Send now";
      }
      sendBtn.addEventListener("click", () => {
        const sent = document.getElementById("li-sent");
        sent.textContent = "✓ Message sent to " + q();
        sent.classList.remove("hidden");
      });
    </script>
  </body>
</html>
